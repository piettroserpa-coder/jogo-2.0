<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>One Piece: Black Ocean JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header>
            <div class="stat">💰 <span id="money">1000</span></div>
            <div class="stat">⚓ Nível: <span id="player-lvl">1</span></div>
            <div class="stat">🔥 Poder: <span id="total-power">0</span></div>
        </header>

        <main>
            <section id="gacha-panel">
                <div class="wanted-poster" id="poster">
                    <div class="poster-inner">
                        <img id="char-img" src="https://images.unsplash.com/photo-1518531966227-1aa3149723f0?q=80&w=200&h=250&auto=format&fit=crop" alt="Personagem">
                        <h2 id="char-name">Sorteie um Nakama</h2>
                        <p id="char-rarity">-</p>
                    </div>
                </div>
                <button onclick="pullCharacter()" id="btn-pull">RECRUTAR (500 ฿)</button>
            </section>

            <section id="action-panel">
                <div id="location-info">
                    <h3>📍 Mar de East Blue</h3>
                    <p id="event-text">Pronto para zarpar?</p>
                </div>
                <div class="battle-buttons">
                    <button onclick="navigate('low')" class="btn-nav">Explorar Ilha Próxima</button>
                    <button onclick="navigate('high')" class="btn-nav danger">Ir para a Grand Line</button>
                </div>
                <div id="log-box"></div>
            </section>
        </main>

        <footer id="crew-list">
            <h3>Sua Tripulação</h3>
            <div id="crew-grid"></div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
